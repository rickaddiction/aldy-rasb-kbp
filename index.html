<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aldy Ardiwinata — Property Sales KBP</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B1A2E;
    --navy-mid: #16294a;
    --gold: #C8922A;
    --gold-light: #E8B84B;
    --off-white: #F5F0E8;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--off-white);
  }

  /* ── SCROLL CONTAINER ── */
  .scroll-container {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
  }

  .page {
    height: 100vh;
    width: 100%;
    scroll-snap-align: start;
    scroll-snap-stop: always;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 5.5rem 1.5rem 3.5rem;
    background:
      radial-gradient(circle at 15% 8%, rgba(200,146,42,0.10) 0%, transparent 45%),
      radial-gradient(circle at 85% 92%, rgba(200,146,42,0.08) 0%, transparent 45%),
      linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 55%, var(--navy) 100%);
  }

  /* ── TOP BAR (fixed across all pages) ── */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.4rem 2.5rem;
    background: linear-gradient(to bottom, rgba(11,26,46,0.92), transparent);
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: 1.4rem;
    color: var(--off-white);
  }
  .brand span { color: var(--gold); font-style: normal; }

  .wa-button {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--gold);
    color: var(--navy);
    padding: 0.6rem 1.2rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }
  .wa-button:hover { background: var(--gold-light); transform: translateY(-1px); }

  /* ── CTA BUTTON (matches wa-button style) ── */
  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--gold);
    color: var(--navy);
    padding: 0.6rem 1.2rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    border: none;
    cursor: pointer;
    margin-top: 1.2rem;
  }
  .cta-button:hover { 
    background: var(--gold-light); 
    transform: translateY(-1px); 
  }

  /* ── PAGE HEADER LABEL ── */
  .page-label {
    text-align: center;
    margin-bottom: 1.6rem;
  }
  .page-eyebrow {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    color: var(--off-white);
  }

  /* ── FRAME ── */
  .frame {
    display: block;
    width: 100%;
    max-width: 720px;
    background: var(--off-white);
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.45),
      0 1px 0 rgba(200,146,42,0.25) inset;
    position: relative;
    text-decoration: none;
    /* frame is an image container only; remove pointer cursor so it doesn't look like a button */
    cursor: default;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .frame:hover {
    transform: translateY(-4px);
    box-shadow:
      0 36px 90px rgba(0,0,0,0.5),
      0 1px 0 rgba(200,146,42,0.4) inset;
  }
  .frame:hover::before {
    border-color: rgba(200,146,42,0.6);
  }

  .tap-hint {
    text-align: center;
    margin-top: 0.9rem;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.35);
  }
  .tap-hint span { color: var(--gold); }
  .frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(200,146,42,0.35);
    border-radius: 10px;
    pointer-events: none;
    z-index: 2;
  }
  .frame img {
    display: block;
    width: 100%;
    height: auto;
  }

  /* ── DOTS NAV ── */
  .dots {
    position: fixed;
    right: 2rem;
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
  }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(245,240,232,0.25);
    border: none;
    cursor: pointer;
    transition: background 0.25s, transform 0.25s;
    padding: 0;
  }
  .dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: absolute;
    bottom: 1.6rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    animation: bounce 2s infinite;
  }
  .scroll-hint svg { opacity: 0.6; }
  @keyframes bounce {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, 6px); }
  }

  .page-footer-note {
    margin-top: 1.4rem;
    text-align: center;
    color: rgba(245,240,232,0.35);
    font-size: 0.72rem;
    letter-spacing: 0.05em;
  }
  .page-footer-note span { color: var(--gold); }

  @media (max-width: 600px) {
    .top-bar { padding: 1.1rem 1.2rem; }
    .brand { font-size: 1.15rem; }
    .page { padding: 4.5rem 1rem 3rem; }
    .dots { right: 0.8rem; gap: 0.7rem; }
    .frame { border-radius: 6px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .scroll-hint { animation: none; }
    .scroll-container { scroll-behavior: auto; }
  }
</style>
</head>
<body>

  <div class="top-bar">
    <div class="brand">Aldy <span>Ardiwinata</span></div>
    <a href="https://wa.me/628986445214" class="wa-button" target="_blank" rel="noopener noreferrer">
      <!-- WhatsApp logo + label -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><path d="M20.52 3.48A11.91 11.91 0 0 0 12 0C5.37 0 .08 5.29.08 11.92c0 2.1.55 4.15 1.6 5.95L0 24l6.36-1.66c1.7.92 3.6 1.4 5.64 1.4 6.63 0 11.92-5.29 11.92-11.92 0-3.19-1.24-6.19-3.4-8.14zM12 21.82c-1.9 0-3.77-.52-5.38-1.51l-.38-.23-3.78.98.99-3.69-.25-.38A9.49 9.49 0 0 1 2.5 11.92C2.5 7.1 6.16 3.44 11 3.44c2.54 0 4.92.97 6.71 2.74A9.4 9.4 0 0 1 20.5 11.9c0 5.2-4.2 9.92-8.5 9.92zM17.2 14.06c-.24-.12-1.41-.7-1.63-.78-.22-.08-.38-.12-.55.13-.16.25-.62.75-.76.9-.14.16-.28.18-.52.06-.24-.12-1.01-.37-1.92-1.18-.71-.64-1.18-1.42-1.31-1.66-.13-.24-.01-.37.11-.49.12-.12.27-.32.41-.48.14-.16.19-.28.28-.48.09-.2.05-.36-.02-.49-.07-.13-.55-1.34-.76-1.86-.2-.48-.41-.41-.56-.42l-.48-.01c-.16 0-.41.06-.63.3-.22.24-.84.82-.84 2 0 1.18.86 2.33.98 2.49.12.16 1.7 2.6 4.12 3.64 2.43 1.04 2.43.69 2.87.65.45-.04 1.41-.57 1.61-1.12.2-.54.2-1.01.14-1.12-.06-.11-.22-.17-.46-.29z"/></svg>
      <span>WhatsApp</span>
    </a>
  </div>

  <div class="dots">
    <button class="dot active" data-target="0" aria-label="Profil"></button>
    <button class="dot" data-target="1" aria-label="Katalog Produk"></button>
    <button class="dot" data-target="2" aria-label="Daftar KPR"></button>
  </div>

  <div class="scroll-container" id="scrollContainer">

    <!-- PAGE 1: PROFIL -->
    <section class="page" id="page-0">
      <div class="page-label">
        <div class="page-eyebrow">01 - Perkenalan</div>
        <div class="page-title">Profil Diri</div>
      </div>
      <div class="frame" role="img" aria-label="Foto profil Aldy Ardiwinata">
        <img src="assets/crop-profil.png" alt="Profil Aldy Ardiwinata - Sales Internship Kota Baru Parahyangan" />
      </div>
      <!-- CTA button kept separate from the image/frame -->
      <a href="https://wa.me/628986445214" target="_blank" class="cta-button" rel="noopener noreferrer">Hubungi via WhatsApp</a>
      <div class="scroll-hint">
        <span>Scroll</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </div>
    </section>

    <!-- PAGE 2: KATALOG -->
    <section class="page" id="page-1">
      <div class="page-label">
        <div class="page-eyebrow">02 - Pilihan Hunian</div>
        <div class="page-title">Katalog Produk</div>
      </div>
      <div class="frame" role="img" aria-label="Katalog produk hunian">
        <img src="assets/crop-katalog.png" alt="Katalog rumah Tatar Wangsakerta, Bungawari, Surawisesa, Nilapadmi, Jayaprakasa, Kartawijaya" />
      </div>
      <a href="https://wa.me/628986445214" target="_blank" class="cta-button" rel="noopener noreferrer">Tanya Unit & Harga</a>
      <div class="scroll-hint">
        <span>Scroll</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </div>
    </section>

    <!-- PAGE 3: KPR -->
    <section class="page" id="page-2">
      <div class="page-label">
        <div class="page-eyebrow">03 - Simulasi Pembiayaan</div>
        <div class="page-title">Daftar KPR</div>
      </div>
      <div class="frame" role="img" aria-label="Daftar KPR dan simulasi pembiayaan">
        <img src="assets/crop-kpr.png" alt="Daftar bank dan suku bunga KPR terendah, rekomendasi Mandiri, Bank Jakarta, UOB" />
      </div>
      <a href="https://wa.me/628986445214" target="_blank" class="cta-button" rel="noopener noreferrer">Konsultasi Simulasi KPR</a>
      <div class="page-footer-note">© 2026 Aldy Ardiwinata &nbsp;·&nbsp; <span>+62 898-6445-214</span> &nbsp;·&nbsp; @aldy-rasb-kbp</div>
    </section>

  </div>

<script>
  const container = document.getElementById('scrollContainer');
  const pages = [document.getElementById('page-0'), document.getElementById('page-1'), document.getElementById('page-2')];
  const dots = document.querySelectorAll('.dot');

  dots.forEach(dot => {
    dot.addEventListener('click', () => {
      const idx = parseInt(dot.dataset.target);
      pages[idx].scrollIntoView({ behavior: 'smooth' });
    });
  });

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = pages.indexOf(entry.target);
        dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      }
    });
  }, { root: container, threshold: 0.6 });

  pages.forEach(p => observer.observe(p));
</script>
</body>
</html>
